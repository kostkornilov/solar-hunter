services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      GEE_SERVICE_ACCOUNT_KEY_PATH: /run/secrets/gee-sa.json
    volumes:
      - ./secrets/gee/gee-sa.json:/run/secrets/gee-sa.json:ro

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
